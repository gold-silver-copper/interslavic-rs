[workspace]
members = [
    "crates/interslavic",
    "crates/interslavic-core",
]
default-members = [
    "crates/interslavic",
    "crates/interslavic-core",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/gold-silver-copper/interslavic-rs"

[workspace.dependencies]
interslavic-core = { path = "crates/interslavic-core", version = "0.2.1" }
