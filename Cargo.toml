[workspace]
members = [
    "crates/interslavic-core",
    "crates/interslavic",
    "crates/extractor",
    "crates/xtask",
]
resolver = "2"

[workspace.package]
edition = "2021"
license = "MIT OR Apache-2.0"
repository = "https://github.com/gold-silver-copper/interslavic-rs"

[workspace.lints.rust]
unsafe_code = "forbid"
